name: Update formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (e.g. 0.12.0)"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Resolve version and checksum
        id: meta
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          VERSION="${INPUT_VERSION:-$PAYLOAD_VERSION}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://registry.npmjs.org/create-awesome-node-app/latest | jq -r '.version')
          fi
          URL="https://registry.npmjs.org/create-awesome-node-app/-/create-awesome-node-app-${VERSION}.tgz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"      >> "$GITHUB_OUTPUT"
          echo "url=$URL"         >> "$GITHUB_OUTPUT"

      - name: Patch formula
        env:
          FORMULA_URL: ${{ steps.meta.outputs.url }}
          FORMULA_SHA: ${{ steps.meta.outputs.sha256 }}
        run: |
          sed -i "s|url \".*\"|url \"${FORMULA_URL}\"|"     Formula/create-awesome-node-app.rb
          sed -i "s|sha256 \".*\"|sha256 \"${FORMULA_SHA}\"|" Formula/create-awesome-node-app.rb

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5590a76d # v5
        with:
          commit_message: "feat: update formula to ${{ steps.meta.outputs.version }}"
          commit_user_name: "Create Node App Bot"
          commit_user_email: "ulisescf.24@gmail.com"
